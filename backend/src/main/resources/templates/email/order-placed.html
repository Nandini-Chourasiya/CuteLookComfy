<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Order Confirmed</title></head>
<body style="font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px;">
  <div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden;">
    <div style="background: #E8242A; padding: 30px; text-align: center;">
      <h1 style="color: #fff; margin: 0; font-size: 28px;">Order Confirmed!</h1>
    </div>
    <div style="padding: 30px;">
      <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
      <p>Your order has been placed successfully!</p>
      <div style="background: #f9f9f9; padding: 20px; border-radius: 6px; margin: 20px 0;">
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Total Amount:</strong> ₹<span th:text="${order.totalAmount}"></span></p>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
      </div>
      <h3>Items Ordered:</h3>
      <table style="width: 100%; border-collapse: collapse;">
        <thead>
          <tr style="background: #E8242A; color: #fff;">
            <th style="padding: 10px; text-align: left;">Item</th>
            <th style="padding: 10px;">Qty</th>
            <th style="padding: 10px;">Price</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${order.items}">
            <td style="padding: 10px; border-bottom: 1px solid #eee;" th:text="${item.productName}"></td>
            <td style="padding: 10px; text-align: center; border-bottom: 1px solid #eee;" th:text="${item.qty}"></td>
            <td style="padding: 10px; text-align: right; border-bottom: 1px solid #eee;">₹<span th:text="${item.totalPrice}"></span></td>
          </tr>
        </tbody>
      </table>
      <p style="text-align: right;"><strong>Total: ₹<span th:text="${order.totalAmount}"></span></strong></p>
    </div>
    <div style="background: #333; padding: 20px; text-align: center; color: #aaa; font-size: 12px;">
      <p>Thank you for shopping with us!</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Return Request Received</title></head>
<body style="font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px;">
  <div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden;">
    <div style="background: #E8242A; padding: 30px; text-align: center;">
      <h1 style="color: #fff; margin: 0;">Return Request Received</h1>
    </div>
    <div style="padding: 30px;">
      <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
      <p>We've received your return request for order #<span th:text="${order.id}"></span>.</p>
      <p>Our team will review it and contact you within 24-48 hours.</p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Order Cancelled</title></head>
<body style="font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px;">
  <div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden;">
    <div style="background: #333; padding: 30px; text-align: center;">
      <h1 style="color: #fff; margin: 0;">Order Cancelled</h1>
    </div>
    <div style="padding: 30px;">
      <p>Hi <strong th:text="${customerName}">Customer</strong>,</p>
      <p>Your order has been cancelled. If you paid, a refund will be processed within 5-7 business days.</p>
    </div>
  </div>
</body>
</html>
